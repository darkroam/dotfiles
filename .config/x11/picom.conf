# 基础设置
backend = "glx";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = false;
unredir-if-possible = true;
vsync = true;
dbe = false;
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];
glx-copy-from-front = false;

# 圆角
corner-radius = 10;
round-borders = 2;
rounded-corners-exclude = [
    # "class_g *= 'dwm'",
    "class_g *= 'fcitx'",
];

# 阴影
shadow = false;
detect-rounded-corners = false;
shadow-radius = 4;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-opacity = 0.25;
shadow-ignore-shaped = false;
shadow-exclude = [
	"_NET_WM_STATE *= '_NET_WM_STATE_HIDDEN'",
	"_GTK_FRAME_EXTENTS",
	"override_redirect = 1 && !WM_CLASS",
    "name = 'Notification'",
    "class_g ?= 'Dmenu'",
    "class_g *= 'dwm'",
    "class_g *= 'Wine'",
    "name = 'Dunst'",
    "class_g *= 'float'"
];

# 透明
active-opacity = 1.0;
opacity-rule = [
    "100:_NET_WM_STATE *= '_NET_WM_STATE_STICKY'", # 画中画
    "100:_NET_WM_STATE *= '_NET_WM_STATE_FULLSCREEN' && WM_CLASS *= 'google-chrome'", # 全屏 chrome 窗口
    "100:WM_NAME = '画中画'",
    "100:WM_CLASS *= 'vncviewer'",
    "100:class_g = 'St'",
    "100:class_i = 'st'",
    "100:class_g = 'mpv'",
    "100:class_g = 'obs'",
    "100:class_g = 'Gimp'",
    # Do not restore "92:!focused"; global inactive transparency washed out ARGB windows.
];

# 淡入淡出
fading = true;
fade-delta = 2;
fade-in-step = 0.01;
fade-out-step = 0.01;
fade-exclude = [
    "class_g *= 'fcitx'",
    "class_g = 'Rofi'",
    "WM_CLASS *= 'screenkey'",
];

# 动画
# picom v13 no longer supports the legacy animation-for-* options.
# Keep a lightweight preset animation that works with the current parser.
animations = ({
    triggers = [ "open", "show" ];
    preset = "appear";
    duration = 0.14;
    scale = 0.96;
}, {
    triggers = [ "close", "hide" ];
    preset = "disappear";
    duration = 0.12;
    scale = 0.96;
});

# 模糊
blur-method = "dual_kawase";
blur-strength = 4;
blur-background-exclude = [
    # "class_g *= 'dwm'",
    "class_g = 'fcitx'",
	"window_type = 'dock'",
	"window_type = 'desktop'",
	"_GTK_FRAME_EXTENTS",
    "class_g *= 'wemeetapp'",
    "_NET_WM_NAME *= 'wechat'",
];

# 针对窗口类型的设置
wintypes :
{
  tooltip: { fade = false; shadow = false; opacity = 1.0; focus = true; };
  fullscreen: { fade = false; shadow = false; focus = true; opacity = 1.0; };
};
